name: Latest blog post workflow
on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    name: Update README with latest fatpasty.com posts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://fatpasty.com/rss.xml"
          max_post_count: 6
          template: "- [$title]($url) <sub>$date</sub><br>&nbsp;&nbsp;&nbsp;<sub>$description</sub>"
          date_format: "mmm d, yyyy"
